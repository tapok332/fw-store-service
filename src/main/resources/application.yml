server:
  port: 8083

spring:
  application:
    name: store-service
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    # Local default = PostgreSQL superuser created by init-databases.sql.
    # docker-compose / prod override via SPRING_DATASOURCE_* env vars
    # (per-service users — see .env.example). See docs/decisions/0008.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foodwise_stores}
    username: ${SPRING_DATASOURCE_USERNAME:tapok332}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  cache:
    type: simple

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET}

services:
  surprisebox-service:
    url: ${SERVICES_SURPRISEBOX_URL:http://surprisebox-service:8084}

foodwise:
  store:
    timezone: ${STORE_TIMEZONE:Europe/Kyiv}

gcp:
  storage:
    bucket: foodwise-store-images

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{requestId:-},%X{userId:-}]"
